<!-- 🌍 TRANSLATOR CORREGIDO -->
<script>
function setLanguage(lang) {
  localStorage.setItem('lang', lang);
  applyLanguage();
}

function safeText(id, text) {
  const el = document.getElementById(id);
  if (el) el.innerText = text;
}

function safePlaceholder(id, text) {
  const el = document.getElementById(id);
  if (el) el.placeholder = text;
}

function applyLanguage() {
  const lang = localStorage.getItem('lang') || 'en';

  const navLinks = document.querySelectorAll('nav a');

  if (lang === 'fr') {

    if (navLinks.length >= 6) {
      navLinks[0].innerText = 'Accueil';
      navLinks[1].innerText = 'Services';
      navLinks[2].innerText = 'Processus';
      navLinks[3].innerText = 'Galerie';
      navLinks[4].innerText = 'Avis';
      navLinks[5].innerText = 'Contact';
    }

    safeText('hero-title', 'Obtenez votre devis gratuit');
    safeText('hero-sub', 'Réponse rapide. Service professionnel fiable.');
    safeText('hero-btn', 'Demander un devis');

    safeText('contact-title', 'Parlons-en');
    safeText('info-badge', 'Contact');
    safeText('form-badge', 'Demande de devis');

    safeText('loc-label', 'Emplacement :');
    safeText('phone-label', 'Téléphone :');

    safePlaceholder('name', 'Nom complet');
    safePlaceholder('email', 'Adresse email');
    safePlaceholder('phone', 'Numéro de téléphone');
    safePlaceholder('message', 'Décrivez vos besoins...');

    safeText('submit-btn', 'Envoyer la demande');

    safeText('visual-badge', 'Service professionnel');
    safeText('visual-text', 'Nous offrons des services fiables avec une grande attention aux détails.');

    safeText('cta-title', 'Fiable. Professionnel. Précis.');
    safeText('cta-btn', 'Voir les services');

  } else {

    // RESTAURAR SOLO LO NECESARIO (SIN RECARGAR)
    if (navLinks.length >= 6) {
      navLinks[0].innerText = 'Home';
      navLinks[1].innerText = 'Services';
      navLinks[2].innerText = 'Process';
      navLinks[3].innerText = 'Gallery';
      navLinks[4].innerText = 'Reviews';
      navLinks[5].innerText = 'Contact';
    }

    safeText('hero-title', 'Get Your Free Quote');
    safeText('hero-sub', 'Fast response. Professional service you can trust.');
    safeText('hero-btn', 'Request a Free Quote');

    safeText('contact-title', 'Let’s Talk');
    safeText('info-badge', 'Contact Info');
    safeText('form-badge', 'Request a Quote');

    safeText('loc-label', 'Location:');
    safeText('phone-label', 'Phone:');

    safePlaceholder('name', 'Full Name');
    safePlaceholder('email', 'Email Address');
    safePlaceholder('phone', 'Phone Number');
    safePlaceholder('message', 'Describe your needs...');

    safeText('submit-btn', 'Request a Free Quote');

    safeText('visual-badge', 'Professional Service');
    safeText('visual-text', 'We deliver reliable, high-quality cleaning services with attention to detail and customer satisfaction.');

    safeText('cta-title', 'Reliable. Professional. Detail-Oriented.');
    safeText('cta-btn', 'Explore Services');
  }
}

document.addEventListener('DOMContentLoaded', applyLanguage);
</script>

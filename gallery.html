<script>
function applyLanguage() {
  const lang = localStorage.getItem('lang') || 'en';

  if (lang === 'fr') {
    document.querySelectorAll('nav a')[0].innerText = 'Accueil';
    document.querySelectorAll('nav a')[1].innerText = 'Services';
    document.querySelectorAll('nav a')[2].innerText = 'Processus';
    document.querySelectorAll('nav a')[3].innerText = 'Avis';
    document.querySelectorAll('nav a')[4].innerText = 'Nos travaux';
    document.querySelectorAll('nav a')[5].innerText = 'Galerie';
    document.querySelectorAll('nav a')[6].innerText = 'Contact';

    document.querySelector('.quote-float').innerText = 'Obtenir un devis';
    document.querySelector('.hero-small h1').innerText = 'Galerie de nos travaux';
    document.querySelector('h2').innerText = 'Voir nos résultats';

  } else {
    document.querySelectorAll('nav a')[0].innerText = 'Home';
    document.querySelectorAll('nav a')[1].innerText = 'Services';
    document.querySelectorAll('nav a')[2].innerText = 'Process';
    document.querySelectorAll('nav a')[3].innerText = 'Reviews';
    document.querySelectorAll('nav a')[4].innerText = 'Our Work';
    document.querySelectorAll('nav a')[5].innerText = 'Gallery';
    document.querySelectorAll('nav a')[6].innerText = 'Contact';

    document.querySelector('.quote-float').innerText = 'Get a Free Quote';
  }
}

applyLanguage();
</script>
